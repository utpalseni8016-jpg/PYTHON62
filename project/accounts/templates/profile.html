{% extends "dbase.html" %}

{% block content %}
<main class="flex mt-5 ml-5 mr-5 w-[79vw] gap-3 h-[85vh] mb-5 absolute bottom-1 right-1 ">
    <div class="w-full">

        <!-- Form Card -->
        <div class="bg-[#121518] rounded-3xl shadow-2xl border border-white/5 overflow-hidden">

            <!-- Header -->
     
            <form method="POST" enctype="multipart/form-data" class="p-8 space-y-8">
                {% csrf_token %}

                <!-- Profile Picture -->
                <div>
                    <label class="block text-sm text-gray-300 mb-3 font-medium">Profile Picture</label>
                    <div class="flex items-center gap-5 bg-[#1e1f22] border border-white/10 rounded-2xl p-4">
                        <label class="cursor-pointer bg-[#2a2c31] hover:bg-[#32353b] transition-colors px-6 py-3 rounded-xl text-sm font-medium flex items-center gap-2">
                            Choose Image
                            <input type="file" name="profile_picture" accept="image/*" class="hidden" id="profile_picture">
                        </label>
                        <span id="fileName" class="text-gray-400 text-sm truncate">No file chosen</span>
                    </div>
                </div>

                <!-- Personal Information -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-8">
                    
                    <!-- First Name -->
                    <div>
                        <label class="block text-sm text-gray-300 mb-2 font-medium">First Name</label>
                        <input type="text" name="first_name" value="{{ user.first_name }}"
                               class="w-full bg-[#1e1f22] border border-white/10 rounded-2xl px-5 py-3.5 text-white 
                                      focus:outline-none focus:border-emerald-500 transition-colors"
                               placeholder="John">
                    </div>

                    <!-- Last Name -->
                    <div>
                        <label class="block text-sm text-gray-300 mb-2 font-medium">Last Name</label>
                        <input type="text" name="last_name" value="{{ user.last_name }}"
                               class="w-full bg-[#1e1f22] border border-white/10 rounded-2xl px-5 py-3.5 text-white 
                                      focus:outline-none focus:border-emerald-500 transition-colors"
                               placeholder="Doe">
                    </div>

                    <!-- Username -->
                    <div>
                        <label class="block text-sm text-gray-300 mb-2 font-medium">Username</label>
                        <input type="text" name="username" value="{{ user.username }}"
                               class="w-full bg-[#1e1f22] border border-white/10 rounded-2xl px-5 py-3.5 text-white 
                                      focus:outline-none focus:border-emerald-500 transition-colors"
                               placeholder="johndoe">
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-sm text-gray-300 mb-2 font-medium">Email Address</label>
                        <input type="email" name="email" value="{{ user.email }}"
                               class="w-full bg-[#1e1f22] border border-white/10 rounded-2xl px-5 py-3.5 text-white 
                                      focus:outline-none focus:border-emerald-500 transition-colors"
                               placeholder="johndoe@gmail.com">
                    </div>

                        <!-- Phone -->
                    <div class="">
                        <label class="block text-sm text-gray-300 mb-2 font-medium">Phone Number</label>
                        <input type="tel" name="phone" value="{{ user.phone_number }}"
                               class="w-full bg-[#1e1f22] border border-white/10 rounded-2xl px-5 py-3.5 text-white 
                                      focus:outline-none focus:border-emerald-500 transition-colors"
                               placeholder="+91 98765 43210">
                    </div>

                    <!-- Address -->
                    <div class="">
                        <label class="block text-sm text-gray-300 mb-2 font-medium">Address</label>
                        <input name="address" value="{{ user.address }}"
                                  class="w-full bg-[#1e1f22] border border-white/10 rounded-2xl px-5 py-3.5 text-white 
                                         focus:outline-none focus:border-emerald-500 transition-colors resize-y"
                                  placeholder="Enter your full address">
                    </div>
                

                </div>

                <hr class="border-white/10 my-4">

    
                <!-- Submit Button -->
                <button type="submit"
                        class="w-full mt-5 bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 
                               py-4 rounded-2xl text-white font-semibold text-lg transition-all shadow-sm shadow-emerald-900/50">
                    Save Changes
                </button>
            </form>

        </div>

    </div>
</main>
{% endblock content %}
