{% extends "base.html" %}

{% block title %}
    Sign In - JunnEV
{% endblock title %}

{% block content %}

<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  
  <!-- Animated background decoration - pure Tailwind -->
 

  <!-- Main Card - enhanced with better shadows, spacing, and interactive elements -->
  <div class="w-full max-w-md">
    
    <!-- Header with logo/brand -->
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold bg-gradient-to-r from-white to-gray-300 bg-clip-text text-transparent">Welcome Back</h2>
      <p class="text-gray-400 mt-2 text-sm">Sign in to continue your EV journey</p>
    </div>

    <!-- Card Container -->
    <div class="bg-gray-900/80 backdrop-blur-xl border border-gray-700/50 rounded-2xl p-8 shadow-2xl shadow-black/10">
      
      <form class="space-y-6" method="post">
        {% csrf_token %}
        <!-- Email Field with icon -->
        <div class="space-y-1">
          <label for="username" class="block text-sm font-medium text-gray-200 ml-1">
            <i class="fas fa-user mr-2 text-teal-400 text-xs"></i>Username
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-user text-gray-500 text-sm"></i>
            </div>
            <input
              type="text"
              name="username"
              id="username"
              class="w-full pl-10 pr-4 py-3 bg-gray-800/50 border border-gray-700 rounded-xl focus:outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-500/30 transition-all duration-200 text-gray-100 placeholder:text-gray-500"
              placeholder="johndoe"
          
            />
          </div>
        </div>

        <!-- Password Field with icon and show/hide toggle -->
        <div class="space-y-1">
          <div class="flex justify-between items-center ml-1">
            <label for="password" class="block text-sm font-medium text-gray-200">
              <i class="fas fa-lock mr-2 text-teal-400 text-xs"></i>Password
            </label>
          </div>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-lock text-gray-500 text-sm"></i>
            </div>
            <input
              type="password"
              name="password"
              id="password"
              class="w-full pl-10 pr-12 py-3 bg-gray-800/50 border border-gray-700 rounded-xl focus:outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-500/30 transition-all duration-200 text-gray-100 placeholder:text-gray-500"
              placeholder="••••••••"
              required
            />
            <button
              type="submit"
              id="togglePassword"
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-teal-400 transition-colors"
            >
              <i class="fas fa-eye-slash text-sm" id="toggleIcon"></i>
            </button>
          </div>
        </div>

        <!-- Remember Me + Forgot (inline refined) -->
        <div class="flex items-center justify-end">
          

          <a href="#" class="text-sm text-teal-400 hover:text-teal-300 transition-colors font-medium">
            <i class="fas fa-key mr-1 text-xs"></i>Forget password?
          </a>
        </div>

        <!-- Submit Button with enhanced hover effects -->
        <button
          type="submit"
          class="w-full py-3.5 mt-4 bg-gradient-to-r bg-[#09a492]  text-white font-semibold rounded-xl transition-all duration-300 shadow-lg  hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2"
        >
          <i class="fas fa-arrow-right-to-bracket text-sm"></i>
          Sign In
        </button>

        <!-- Divider with OR -->
        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-700"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-3 bg-gray-900/80 text-gray-500">Or continue with</span>
          </div>
        </div>

        
      </form>

      <!-- Sign Up Link with better styling -->
      <div class="mt-8 text-center">
        <p class="text-gray-400 text-sm">
          New to JunnEV?
          <a href="{% url 'sign-up' %}" class="text-teal-400 hover:text-teal-300 font-semibold ml-1 inline-flex items-center gap-1 group">
            Create an account
            <i class="fas fa-arrow-right text-xs group-hover:translate-x-1 transition-transform"></i>
          </a>
        </p>
      </div>

      

    </div>
  </div>
</div>
{% endblock content %}
