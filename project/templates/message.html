{% if messages %}
<ul class="fixed bottom-5 right-5 space-y-4 z-50 w-80">
    {% for message in messages %}
    <li>
        <div class="flex items-start gap-3 p-4 rounded-lg shadow-md border-l-4
            {% if message.tags == 'success' %}
                bg-green-100 border-green-500 text-green-700
            {% elif message.tags == 'error' %}
                bg-red-100 border-red-500 text-red-700
            {% elif message.tags == 'warning' %}
                bg-yellow-100 border-yellow-500 text-yellow-700
            {% else %}
                bg-blue-100 border-blue-500 text-blue-700
            {% endif %}"
            role="alert"
        >
            <!-- Text -->
            <div class="flex-1">
                <p class="font-semibold capitalize">{{ message.tags }}</p>
                <p class="text-sm">{{ message }}</p>
            </div>
            
            <!-- Close button -->
            <button onclick="this.parentElement.remove()" 
                    class="text-lg font-bold opacity-60 hover:opacity-100">
                ×
            </button>

        </div>
    </li>
    {% endfor %}
</ul>
{% endif %}
