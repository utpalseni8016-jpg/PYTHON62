{% load static %}
<aside class="lg:w-72 w-full bg-[#0f1114] border-r border-white/5 p-6">
            <!-- profile card (compact & modern) -->
            <div class="flex flex-col items-center text-center">
                <div class="relative">
                    <img src="{% static "./assets/default.png" %}" alt="profile"
                        class="w-28 h-28 rounded-full border-2 border-emerald-700/40 shadow-lg">
                    <span
                        class="absolute bottom-2 right-2 w-4 h-4 bg-emerald-500 border-2 border-[#0f1114] rounded-full"></span>
                </div>
                <h2 class="mt-4 text-xl font-semibold text-white">{{user.username}}</h2>

                <!-- quick stats -->
                <div class="flex justify-center gap-4 mt-4 w-full text-xs">
                    <div class="bg-[#1a1d21] py-2 px-3 rounded-lg">
                        <p class="text-gray-500">bookings</p>
                        <p class="text-white font-medium">18</p>
                    </div>
                    <div class="bg-[#1a1d21] py-2 px-3 rounded-lg">
                        <p class="text-gray-500">Cars</p>
                        <p class="text-white font-medium">1</p>
                    </div>
                </div>
            </div>

            <hr class="border-white/5 my-6">

            <!-- navigation menu -->
            <nav class="space-y-1">
                <a href="#"
                    class="flex items-center gap-3 bg-emerald-900/30 text-emerald-300 py-2.5 px-4 rounded-xl border border-emerald-800/40">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                            d="M4 6h16M4 12h16M4 18h7" />
                    </svg>
                    <span>Overview</span>
                </a>
                <a href="#"
                    class="flex items-center gap-3 text-gray-400 hover:text-white hover:bg-white/5 py-2.5 px-4 rounded-xl transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                            d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                    <span>Slot Booking</span>
                </a>
                <a href="#"
                    class="flex items-center gap-3 text-gray-400 hover:text-white hover:bg-white/5 py-2.5 px-4 rounded-xl transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                    <span>Service history</span>
                </a>
            </nav>

            <!-- vehicle summary card (tesla model y) integrated in sidebar for flow -->
            <div
                class="mt-8 bg-gradient-to-br from-[#1a1f24] to-[#13181d] rounded-2xl p-5 border border-white/5 card-glow">
                <div class="flex items-center justify-between">
                    <h3 class="font-semibold text-white">Tesla Model Y</h3>
                    <span class="text-xs bg-emerald-900/50 text-emerald-300 px-2 py-1 rounded-full">charging</span>
                </div>
                <!-- stats grid -->
                <div class="grid grid-cols-2 gap-3 mt-4 text-sm">
                    <div>
                        <p class="text-gray-500 text-xs">max speed</p>
                        <p class="font-semibold text-white">340 km/h</p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-xs">engine</p>
                        <p class="font-semibold text-white">En12 87</p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-xs">maintenance</p>
                        <p class="font-semibold text-white">Every 6 mon</p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-xs">audio</p>
                        <p class="font-semibold text-white">Sony 325i</p>
                    </div>
                </div>
            </div>
        </aside>
