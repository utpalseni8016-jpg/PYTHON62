{% extends "dbase.html" %}


{% block content %}
<main class="flex-1 flex flex-col gap-6 p-6 h-[90vh] w-full overflow-y-auto">
                <div class="flex items-center justify-between w-[75vw]">

                    <!-- LEFT -->
                    <div class="flex items-center gap-3">
                        <span class="w-1 h-6 bg-emerald-500 rounded-full"></span>

                        <h1 class="text-2xl font-semibold text-white">
                            EV Charging Slot Booking
                        </h1>
                    </div>


                    <!-- RIGHT -->
                    <div class="flex items-center gap-3">

                        <div
                            class="text-white/40 flex gap-2 text-sm bg-white/5 px-4 py-2 rounded-full cursor-pointer hover:bg-white/10 transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                                    d="M4 6h16M4 12h16M4 18h7" />
                            </svg>
                            Filter

                        </div>

                        <button class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-xl text-white transition">
                            My Bookings
                        </button>


                    </div>

                </div>

                <div class="max-w-6xl w-full flex flex-col md:flex-row gap-7 items-stretch">

                    <!-- RIGHT SIDE: station list (original cards, slightly polished) -->
                    <div class="w-full">


                        <!-- STATION LIST (exactly as given, with tiny enhancements) -->
                        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                            <!-- using 2 cols on large for better fit beside image -->

                            <!-- Station Card 1 -->
                            <div
                                class="bg-[#1c2127] relative rounded-2xl p-5 border border-white/5 hover:shadow-lg transition shadow-xl">
                                <div class="flex items-center justify-between">

                                    <span class="text-white font-semibold">Station A3 EV 883</span>
                                    <span class="text-xs bg-emerald-600/20 text-emerald-300 px-2 py-1 rounded-full">
                                        Ultra Fast
                                    </span>
                                </div>

                                <p class="text-gray-400 text-sm mt-1">
                                    6 slots available
                                </p>

                                <!-- SLOT GRID -->
                                <div class="grid grid-cols-3 gap-2 mt-4">

                                    <button
                                        class="bg-[#2a2f36] text-gray-300 py-2 rounded-lg hover:bg-emerald-600 hover:text-white transition">
                                        10:00
                                    </button>

                                    <button
                                        class="bg-[#2a2f36] text-gray-300 py-2 rounded-lg hover:bg-emerald-600 hover:text-white transition">
                                        10:30
                                    </button>

                                    <button
                                        class="bg-[#2a2f36] text-gray-300 py-2 rounded-lg hover:bg-emerald-600 hover:text-white transition">
                                        11:00
                                    </button>

                                    <button
                                        class="bg-[#2a2f36] text-gray-300 py-2 rounded-lg hover:bg-emerald-600 hover:text-white transition">
                                        11:30
                                    </button>

                                    <button
                                        class="bg-[#2a2f36] text-gray-300 py-2 rounded-lg hover:bg-emerald-600 hover:text-white transition">
                                        12:00
                                    </button>

                                    <button class="bg-red-600/40 text-red-300 py-2 rounded-lg cursor-not-allowed">
                                        Booked
                                    </button>

                                </div>

                                <!-- BOOK BUTTON -->
                                <button
                                    class="w-full mt-4 bg-emerald-600 hover:bg-emerald-500 py-2 rounded-xl text-white font-medium transition">
                                    Book Slot
                                </button>

                            </div>

                            <!-- Station Card 2 -->
                            <div
                                class="bg-[#1c2127] rounded-2xl p-5 border border-white/5 hover:shadow-lg transition shadow-xl">

                                <div class="flex items-center justify-between">
                                    <span class="text-white font-semibold">Station B2 EV 441</span>
                                    <span class="text-xs bg-blue-600/20 text-blue-300 px-2 py-1 rounded-full">
                                        Normal
                                    </span>
                                </div>

                                <p class="text-gray-400 text-sm mt-1">
                                    4 slots available
                                </p>

                                <div class="grid grid-cols-3 gap-2 mt-4">

                                    <button
                                        class="bg-[#2a2f36] text-gray-300 py-2 rounded-lg hover:bg-emerald-600 hover:text-white transition">
                                        01:00
                                    </button>

                                    <button
                                        class="bg-[#2a2f36]  text-gray-300 py-2 rounded-lg hover:bg-emerald-600 hover:text-white transition">
                                        01:30
                                    </button>

                                    <button
                                        class="bg-red-600/40  text-gray-300 text-red-300 py-2 rounded-lg cursor-not-allowed">
                                        Booked
                                    </button>

                                    <button
                                        class="bg-[#2a2f36]  text-gray-300 py-2 rounded-lg hover:bg-emerald-600 hover:text-white transition">
                                        02:00
                                    </button>

                                    <button
                                        class="bg-[#2a2f36] text-gray-300  py-2 rounded-lg hover:bg-emerald-600 hover:text-white transition">
                                        02:30
                                    </button>


                                </div>

                                <button
                                    class="w-full mt-4 bg-emerald-600 hover:bg-emerald-500 py-2 rounded-xl text-white font-medium transition">
                                    Book Slot
                                </button>

                            </div>

                            <!-- station 3 -->
                            <div
                                class="bg-[#1c2127] rounded-2xl p-5 border border-white/5 hover:shadow-lg transition shadow-xl md:col-span-2 xl:col-span-1">
                                <div class="flex items-center justify-between">
                                    <span class="text-white font-semibold">Station C1 EV 229</span>
                                    <span
                                        class="text-xs bg-purple-600/20 text-purple-300 px-2 py-1 rounded-full">Fast</span>
                                </div>
                                <p class="text-gray-400 text-sm mt-1">2 slots available</p>
                                <div class="grid grid-cols-3 gap-2 mt-4">
                                    <button
                                        class="bg-[#2a2f36] text-gray-300 py-2 rounded-lg hover:bg-emerald-600">09:45</button>
                                    <button
                                        class="bg-[#2a2f36] text-gray-300 py-2 rounded-lg hover:bg-emerald-600">10:15</button>
                                    <button
                                        class="bg-red-600/40 text-gray-300 text-red-300 py-2 rounded-lg cursor-not-allowed">Booked</button>
                                    <button
                                        class="bg-[#2a2f36] text-gray-300 py-2 rounded-lg hover:bg-emerald-600">10:45</button>
                                    <button
                                        class="bg-[#2a2f36] text-gray-300 py-2 rounded-lg hover:bg-emerald-600">11:15</button>
                                    <button
                                        class="bg-[#2a2f36] text-gray-300 py-2 rounded-lg hover:bg-emerald-600">11:45</button>
                                </div>
                                <button
                                    class="w-full text-gray-300 mt-4 bg-emerald-600 hover:bg-emerald-500 py-2 rounded-xl">Book
                                    Slot</button>
                            </div>

                            <!-- station 4 -->
                            <div
                                class="bg-[#1c2127] rounded-2xl p-5 border border-white/5 hover:shadow-lg transition shadow-xl md:col-span-2 xl:col-span-1">
                                <div class="flex items-center justify-between">
                                    <span class="text-white font-semibold">Station C1 EV 229</span>
                                    <span
                                        class="text-xs bg-purple-600/20 text-purple-300 px-2 py-1 rounded-full">Fast</span>
                                </div>
                                <p class="text-gray-400 text-sm mt-1">2 slots available</p>
                                <div class="grid grid-cols-3 gap-2 mt-4">
                                    <button
                                        class="bg-[#2a2f36] text-gray-300 py-2 rounded-lg hover:bg-emerald-600">09:45</button>
                                    <button
                                        class="bg-[#2a2f36] text-gray-300 py-2 rounded-lg hover:bg-emerald-600">10:15</button>
                                    <button
                                        class="bg-red-600/40 text-gray-300 text-red-300 py-2 rounded-lg cursor-not-allowed">Booked</button>
                                    <button
                                        class="bg-[#2a2f36] text-gray-300 py-2 rounded-lg hover:bg-emerald-600">10:45</button>
                                    <button
                                        class="bg-[#2a2f36] text-gray-300 py-2 rounded-lg hover:bg-emerald-600">11:15</button>
                                    <button
                                        class="bg-[#2a2f36] text-gray-300 py-2 rounded-lg hover:bg-emerald-600">11:45</button>
                                </div>
                                <button
                                    class="w-full text-gray-300 mt-4 bg-emerald-600 hover:bg-emerald-500 py-2 rounded-xl">Book
                                    Slot</button>
                            </div>

                        </div>


                    </div>
                </div>

            </main>
{% endblock content %}
