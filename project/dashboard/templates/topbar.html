<header class="bg-[#101112] border-b border-white/5 px-6 py-4 flex flex-wrap items-center justify-between gap-4">
        <!-- logo -->
        <div class="flex items-center gap-2">
            <img src="./assets/logo.png" class="w-50" alt="">
        </div>

        <!-- search bar (refined) -->
        <div class="relative w-full max-w-md">
            <input
                class="w-full bg-[#1e1f22] border border-white/5 rounded-xl py-2.5 pl-11 pr-4 text-sm text-white placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-emerald-700/50 transition"
                type="text" placeholder="Search vehicle or slot...">
            <img class="w-4 h-4 absolute left-4 top-3.5 opacity-50" src="./assets/search.png" alt="search">
        </div>

        <!-- action icons -->
        <div class="flex items-center gap-2">
            <button class="bg-[#1e1f22] hover:bg-[#2a2c30] p-2.5 rounded-xl border border-white/5 transition">
                <img class="w-5 h-5 opacity-80" src="./assets/briefcase.png" alt="briefcase">
            </button>
            <button class="bg-[#1e1f22] hover:bg-[#2a2c30] p-2.5 rounded-xl border border-white/5 transition">
                <img class="w-5 h-5 opacity-80" src="./assets/bell.png" alt="bell">
            </button>
            <button class="bg-[#1e1f22] hover:bg-[#2a2c30] p-2.5 rounded-xl border border-white/5 transition">
                <img class="w-5 h-5 opacity-80" src="./assets/settings.png" alt="settings">
            </button>
        </div>
    </header>
