<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Introduction</title>
    <!-- <link rel="stylesheet" href="tail.css"> -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        * {
            font-family: "Montserrat", sans-serif;
        }
    </style>

</head>
<body>

    <header class="bg-[#141414] flex justify-between items-center p-5">

        <div class="relative">
            <input class="text-white bg-[#1B1C1E] px-5 py-2 pl-13 w-[420px] rounded-xl" type="text" placeholder="Search">
            <img class="w-[24px] absolute top-2 left-3" src="./assets/search.png" alt="">
        </div>


        <div class="flex items-center gap-5">
            <button class="bg-[#171717] shadow-[#1B1C1F] shadow-md border-2 p-2 rounded-md cursor-pointer"><img
                    class="w-[24px]" src="./assets/briefcase.png" alt=""></button>
            <button class="bg-[#171717] shadow-[#1B1C1F] shadow-md border-2 p-2 rounded-md cursor-pointer"><img
                    class="w-[24px]" src="./assets/bell.png" alt=""></button>
            <button class="bg-[#171717] shadow-[#1B1C1F] shadow-md border-2 p-2 rounded-md cursor-pointer"><img
                    class="w-[24px]" src="./assets/settings.png" alt=""></button>

        </div>
    </header>


    <!-- added by utpal seni  -->
     
    <!-- Layout Wrapper -->
    <div class="flex items-center">

        <!-- Sidebar -->
         <section class="w-[300px] min-h-screen p-6 bg-[#141414]">
            <!-- Profile Section -->
             <div class="flex flex-col items-center mb-10">
                <img src="./assets/Rectangle 6.png"
                class="w-[200px] h-[200px] rounded-full object-cover">
                <span class=" w-[250px] h-[25px] mt-3 text-xl font-semibold text-white">
                     Cameron Williamson
                    </span>
                <span class="mt-3 text-[#989898]">
                    Senior product designer
                </span>
            </div>
            <div>
                <hr class="border-[#E4E4E4] my-8">
            </div>
                    <!-- Menu Section -->
             <div>

                <!-- Active Button -->
                 <button class="flex items-center gap-3 bg-[#09A4921A] p-3 cursor-pointer rounded-lg w-full mb-4">
                    <img src="./assets/overview.png" class="w-5">
                    <span class="text-[#09A492]">Overview</span>
                </button>
                <!-- Other Items -->
                 <div class="flex items-center gap-3 text-gray-400 p-3 hover:text-white cursor-pointer">
                    <img src="./assets/battery-charging.png" class="w-5">
                    <span>Battery</span>
                </div>
                <div class="flex items-center gap-3 text-gray-400 p-3 hover:text-white cursor-pointer">
                    <img src="./assets/services.png" class="w-5">
                    <span>Service history</span>
                </div>
            </div>
        </section>

    <!-- added by rounak -->


    <!-- added by somnath -->
    <section>
        right section add
    </section>

</body>

</html>
