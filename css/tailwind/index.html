<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Introduction</title>
    <!-- <link rel="stylesheet" href="tail.css"> -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        * {
            font-family: "Montserrat", sans-serif;
        }
    </style>

</head>

<body>

    <header class="bg-[#141414] flex justify-between items-center p-5">

        <div class="relative">
            <input class="text-white bg-[#1B1C1E] px-5 py-2 pl-13 w-[420px] rounded-xl" type="text" placeholder="Search">
            <img class="w-[24px] absolute top-2 left-3" src="./assets/search.png" alt="">
        </div>



        <div class="flex items-center gap-5">
            <button class="bg-[#171717] shadow-[#1B1C1F] shadow-md border-2 p-2 rounded-md cursor-pointer"><img class="w-[24px]" src="./assets/briefcase.png" alt=""></button>
            <button class="bg-[#171717] shadow-[#1B1C1F] shadow-md border-2 p-2 rounded-md cursor-pointer"><img class="w-[24px]" src="./assets/bell.png" alt=""></button>
            <button class="bg-[#171717] shadow-[#1B1C1F] shadow-md border-2 p-2 rounded-md cursor-pointer"><img class="w-[24px]" src="./assets/settings.png" alt=""></button>

        </div>
    </header>


    <!-- added by utpal seni  -->
    <section>
        <img src="./assets/overview.png" alt="">
    </section>


    <!-- added by rounak -->
    <button>Asus</button>

</body>

</html>
